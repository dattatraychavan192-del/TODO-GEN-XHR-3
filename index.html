<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css"
      integrity="sha384-xOolHFLEh07PJGoPkLv1IbcEPTNtaed2xpHsD9ESMhqIYd0nLMwNLD69Npy4HI+N"
      crossorigin="anonymous"
    />
    <link rel="stylesheet" href="./assets/CSS/style.css" />

    <title>TODO-02-GEN</title>
  </head>
  <body>
    <div class="container-fluid">
      <div class="row">
        <div class="col-md-6 offset-md-3">
          <div class="card shadow-lg border border-danger mt-4">
            <div class="card-header text-center text-light border rounded">
              <h2>TODO</h2>
            </div>
            <form class="form-group p-3" id="todoForm">
              <div>
                <label class="font-weight-bold" for="title">Title*</label>
                <input
                  required
                  type="text"
                  class="form-control"
                  id="title"
                  placeholder="Enter Title"
                />
              </div>
              <div>
                <label class="font-weight-bold" for="body">Status*</label>
                <select required class="form-control" id="completed">
                  <option value="true">Completed</option>
                  <option value="false">Pending</option>
                </select>
              </div>
              <div>
                <label class="font-weight-bold" for="">User ID*</label>
                <select required name="" id="userId" class="form-control">
                  <option value="1">1</option>
                  <option value="2">2</option>
                  <option value="3">3</option>
                  <option value="4">4</option>
                  <option value="5">5</option>
                  <option value="6">6</option>
                  <option value="7">7</option>
                  <option value="8">8</option>
                  <option value="9">9</option>
                  <option value="10">10</option>
                </select>
              </div>
              <button
                class="btn btn-primary btn-sm btn-block mt-4"
                id="addButton"
              >
                Add Todo
              </button>
              <button
                type="button"
                class="btn btn-success btn-sm btn-block mt-4 d-none"
                id="updateButton"
              >
                Update Todo
              </button>
            </form>
          </div>
        </div>
      </div>
      <div class="row mt-5" id="cardContaier"></div>
    </div>

    <div class="spinner d-none" id="spinner">
      <div class="spinner-border text-primary" role="status">
        <span class="visually-hidden"></span>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="./assets/JS/app.js"></script>
  </body>
</html>
`
